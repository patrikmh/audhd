          - paragraph [ref=e287]: "The typical interaction flow consists of these steps:"
          - list [ref=e288]:
            - listitem [ref=e289]:
              - strong [ref=e290]: User sends a message
              - text: to an AI agent
            - listitem [ref=e291]:
              - strong [ref=e292]: Agent generates A2UI messages
              - text: describing the UI (structure + data)
            - listitem [ref=e293]:
              - strong [ref=e294]: Messages stream
              - text: to the client application
            - listitem [ref=e295]:
              - strong [ref=e296]: Client renders
              - text: using native components (Angular, Flutter, React, etc.)
            - listitem [ref=e297]:
              - strong [ref=e298]: User interacts
              - text: with the UI, sending actions back to the agent
            - listitem [ref=e299]:
              - strong [ref=e300]: Agent responds
              - text: with updated A2UI messages
