            - text: .
          - paragraph [ref=e131]:
            - text: "A2UI solves the following problem:"
            - strong [ref=e132]: how can AI agents safely send rich UIs across trust boundaries?
          - paragraph [ref=e133]:
            - text: Instead of text-only responses or risky code execution, A2UI lets agents send
            - strong [ref=e134]: declarative component descriptions
            - text: that clients render using their own native widgets. It's like having agents speak a universal UI language.
          - paragraph [ref=e135]: "This repository contains:"
          - list [ref=e136]:
            - listitem [ref=e137]:
              - strong [ref=e138]:
                - link "A2UI specifications" [ref=e139] [cursor=pointer]:
                  - /url: https://a2ui.org/specification/v0.9.1-a2ui/
              - text: (v0.9.1 current, v1.0 candidate).
            - listitem [ref=e140]:
              - strong [ref=e141]:
                - text: Implementations for
                - link "renderers" [ref=e142] [cursor=pointer]:
                  - /url: https://a2ui.org/reference/renderers/
              - text: (Angular, Flutter, Lit, Markdown, etc.) on the client side.
            - listitem [ref=e143]:
              - strong [ref=e144]:
                - text: Transports like
                - link "A2A" [ref=e145] [cursor=pointer]:
                  - /url: https://a2ui.org/concepts/transports/
              - text: which communicate A2UI messages between agents and clients.
          - list [ref=e147]:
            - listitem [ref=e148]:
              - paragraph [ref=e149]:
                - img [ref=e151]
                - strong [ref=e153]: Secure by Design
              - separator [ref=e154]
              - paragraph [ref=e155]: Declarative data format, not executable code. Agents can only use pre-approved components from your catalog—no UI injection attacks.
            - listitem [ref=e156]:
              - paragraph [ref=e157]:
                - img [ref=e159]
                - strong [ref=e161]: LLM-Friendly
              - separator [ref=e162]
              - paragraph [ref=e163]: Flat, streaming JSON structure designed for easy generation. LLMs can build UIs incrementally without perfect JSON in one shot.
            - listitem [ref=e164]:
              - paragraph [ref=e165]:
                - img [ref=e167]
                - strong [ref=e169]: Framework-Agnostic
              - separator [ref=e170]
              - paragraph [ref=e171]: One agent response works everywhere. Render the same UI on Angular, Flutter, React, or native mobile with your own styled components.
            - listitem [ref=e172]:
              - paragraph [ref=e173]:
                - img [ref=e175]
                - strong [ref=e177]: Progressive Rendering
              - separator [ref=e178]
              - paragraph [ref=e179]: Stream UI updates as they're generated. Users see the interface building in real-time instead of waiting for complete responses.
