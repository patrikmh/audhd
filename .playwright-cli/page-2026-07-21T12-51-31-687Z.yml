          - paragraph [ref=e156]: Get hands-on with A2UI by running the restaurant finder demo. This guide will have you experiencing agent-generated UI in less than 5 minutes.
          - heading "What You'll Build ¶" [level=2] [ref=e157]:
            - text: What You'll Build
            - link "¶" [ref=e158] [cursor=pointer]:
              - /url: https://a2ui.org/quickstart/#what-youll-build
          - paragraph [ref=e159]: "By the end of this quickstart, you'll have:"
          - list [ref=e160]:
            - listitem [ref=e161]: A running web app with A2UI Lit renderer.
            - listitem [ref=e162]: A Gemini-powered agent that generates dynamic UIs.
            - listitem [ref=e163]: An interactive restaurant finder with form generation, time selection, and confirmation flows.
            - listitem [ref=e164]: Understanding of how A2UI messages flow from agent to UI.
          - heading "Prerequisites ¶" [level=2] [ref=e165]:
            - text: Prerequisites
            - link "¶" [ref=e166] [cursor=pointer]:
              - /url: https://a2ui.org/quickstart/#prerequisites
          - paragraph [ref=e167]: "Before you begin, make sure you have:"
          - list [ref=e168]:
            - listitem [ref=e169]:
              - strong [ref=e170]: Node.js
              - text: (v18 or later with
              - link "Corepack" [ref=e171] [cursor=pointer]:
                - /url: https://nodejs.org/api/corepack.html
              - text: enabled) —
              - link "Download here" [ref=e172] [cursor=pointer]:
                - /url: https://nodejs.org/
            - listitem [ref=e173]:
              - strong [ref=e174]: uv
              - text: (Python package manager) —
              - link "Install here" [ref=e175] [cursor=pointer]:
                - /url: https://docs.astral.sh/uv/getting-started/installation/
              - text: (used to run the Python agent backend)
            - listitem [ref=e176]:
              - strong [ref=e177]: A Gemini API key
              - text: —
              - link "Get one free from Google AI Studio" [ref=e178] [cursor=pointer]:
                - /url: https://aistudio.google.com/apikey
          - paragraph [ref=e179]: "WARNING: Security Notice"
          - paragraph [ref=e180]: This demo runs an A2A agent that uses Gemini to generate A2UI responses. The agent has access to your API key and will make requests to Google's Gemini API. Always review agent code before running it in production environments.
