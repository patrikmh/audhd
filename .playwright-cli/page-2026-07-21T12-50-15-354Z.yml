                - generic [ref=e432] [cursor=pointer]: Lifecycle Events
              - generic [ref=e433]:
                - text: "These events represent the lifecycle of an agent run. A typical agent run follows a predictable pattern: it begins with a"
                - code [ref=e434]: RunStarted
                - text: event, may contain multiple optional
                - code [ref=e435]: StepStarted
                - text: /
                - code [ref=e436]: StepFinished
                - text: pairs, and concludes with either a
                - code [ref=e437]: RunFinished
                - text: event (success) or a
                - code [ref=e438]: RunError
                - text: event (failure).
              - generic [ref=e439]: Lifecycle events provide crucial structure to agent runs, enabling frontends to track progress, manage UI states appropriately, and handle errors gracefully. They create a consistent framework for understanding when operations begin and end, making it possible to implement features like loading indicators, progress tracking, and error recovery mechanisms.
              - generic [ref=e440]:
                - text: The
                - code [ref=e441]: RunStarted
                - text: and either
                - code [ref=e442]: RunFinished
                - text: or
                - code [ref=e443]: RunError
                - text: events are mandatory, forming the boundaries of an agent run. Step events are optional and may occur multiple times within a run, allowing for structured, observable progress tracking.
              - heading "Navigate to header RunStarted" [level=3] [ref=e444]:
                - link "Navigate to header" [ref=e445] [cursor=pointer]:
                  - /url: "#runstarted"
                  - img [ref=e447]
                - generic [ref=e450] [cursor=pointer]: RunStarted
              - generic [ref=e451]: Signals the start of an agent run.
              - generic [ref=e452]:
                - text: The
                - code [ref=e453]: RunStarted
                - text: event is the first event emitted when an agent begins processing a request. It establishes a new execution context identified by a unique
                - code [ref=e454]: runId
                - text: . This event serves as a marker for frontends to initialize UI elements such as progress indicators or loading states. It also provides crucial identifiers that can be used to associate subsequent events with this specific run.
              - region "Scrollable table" [ref=e455]:
