                        - code [ref=e469]: runId
                      - cell "ID of the agent run" [ref=e470]
                    - row "parentRunId (Optional) Lineage pointer for branching/time travel. If present, refers to a prior run within the same thread, creating a git-like append-only log" [ref=e471]:
                      - cell "parentRunId" [ref=e472]:
