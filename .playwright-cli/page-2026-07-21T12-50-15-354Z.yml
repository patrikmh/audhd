                - generic [ref=e913] [cursor=pointer]: State Management Events
              - generic [ref=e914]: These events are used to manage and synchronize the agent’s state with the frontend. State management in the protocol follows an efficient snapshot-delta pattern where complete state snapshots are sent initially or infrequently, while incremental updates (deltas) are used for ongoing changes.
              - generic [ref=e915]: "This approach optimizes for both completeness and efficiency: snapshots ensure the frontend has the full state context, while deltas minimize data transfer for frequent updates. Together, they enable frontends to maintain an accurate representation of agent state without unnecessary data transmission."
              - generic [ref=e916]: The combination of snapshots and deltas allows frontends to efficiently track changes to agent state while ensuring consistency. Snapshots serve as synchronization points that reset the state to a known baseline, while deltas provide lightweight updates between snapshots.
              - heading "Navigate to header StateSnapshot" [level=3] [ref=e917]:
                - link "Navigate to header" [ref=e918] [cursor=pointer]:
                  - /url: "#statesnapshot"
                  - img [ref=e920]
                - generic [ref=e923] [cursor=pointer]: StateSnapshot
              - generic [ref=e924]: Provides a complete snapshot of an agent’s state.
              - generic [ref=e925]:
                - text: The
                - code [ref=e926]: StateSnapshot
                - text: event delivers a comprehensive representation of the agent’s current state. This event is typically sent at the beginning of an interaction or when synchronization is needed. It contains all state variables relevant to the frontend, allowing it to completely rebuild its internal representation. Frontends should replace their existing state model with the contents of this snapshot rather than trying to merge it with previous state.
