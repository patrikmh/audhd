              - generic [ref=e731]:
                - text: These events represent the lifecycle of tool calls made by agents. Tool calls follow a streaming pattern similar to text messages. When an agent needs to use a tool, it emits a
                - code [ref=e732]: ToolCallStart
                - text: event, followed by one or more
                - code [ref=e733]: ToolCallArgs
                - text: events that stream the arguments being passed to the tool, and concludes with a
                - code [ref=e734]: ToolCallEnd
                - text: event.
              - generic [ref=e735]: This streaming approach allows frontends to show tool executions in real-time, making the agent’s actions transparent and providing immediate feedback about what tools are being invoked and with what parameters.
