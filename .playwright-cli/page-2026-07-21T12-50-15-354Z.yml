              - generic [ref=e486]:
                - text: Signals the end of an agent run. Every run terminates with either
                - code [ref=e487]: RunFinished
                - text: or
                - code [ref=e488]: RunError
                - text: .
              - generic [ref=e489]:
                - code [ref=e490]: RunFinished
                - text: has an optional
                - code [ref=e491]: outcome
                - text: "discriminated union:"
              - list [ref=e492]:
                - listitem [ref=e493]:
                  - strong [ref=e494]: omitted
                  - text: — legacy producer that has not yet adopted the interrupt-aware lifecycle. Treated as a normal completion.
                - listitem [ref=e495]:
                  - code [ref=e496]: "outcome: { type: \"success\" }"
                  - text: — the run completed normally. The optional
                  - code [ref=e497]: result
                  - text: stays at the root of the event for back-compat.
                - listitem [ref=e498]:
                  - code [ref=e499]: "outcome: { type: \"interrupt\", interrupts: [...] }"
                  - text: — the run paused for human input. The non-empty
                  - code [ref=e500]: interrupts
                  - text: array lives inside the outcome variant. The client resumes by starting a new run whose
                  - code [ref=e501]: RunAgentInput
                  - text: includes a
                  - code [ref=e502]: resume
                  - text: array addressing every open interrupt.
